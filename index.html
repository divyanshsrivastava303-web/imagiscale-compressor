<!DOCTYPE html>
<html>
<head>
    <title>ImagiScale | Image Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0b0f19; color: #f8fafc; font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #111827; padding: 30px; border-radius: 12px; border: 1px solid #1f2937; width: 400px; text-align: center; }
        h2 { color: #10b981; }
        .file-input { margin: 20px 0; }
        .controls { margin-top: 15px; text-align: left; }
        .control-group { margin: 10px 0; }
        label { display: block; font-size: 0.85rem; color: #9ca3af; }
        input[type="range"], input[type="number"] { width: 100%; box-sizing: border-box; }
        button { background: #10b981; border: none; padding: 12px; color: black; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 20px; }
        button:hover { background: #34d399; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ImagiScale Resizer</h2>
        <input type="file" id="file" class="file-input" accept="image/*">
        <div class="controls">
            <div class="control-group">
                <label>Quality (JPEG compression): <span id="q-val">80%</span></label>
                <input type="range" id="quality" min="10" max="100" value="80" oninput="document.getElementById('q-val').textContent=this.value+'%'">
            </div>
            <div class="control-group">
                <label>Max Width (px):</label>
                <input type="number" id="width" value="800">
            </div>
        </div>
        <button onclick="resizeImage()">Compress & Save</button>
    </div>
    <script>
        function resizeImage() {
            const fileInput = document.getElementById('file');
            if (fileInput.files.length === 0) return alert("Select an image first!");
            
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const targetWidth = parseInt(document.getElementById('width').value);
                    const scale = targetWidth / img.width;
                    canvas.width = targetWidth;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const quality = parseFloat(document.getElementById('quality').value) / 100;
                    const compressedData = canvas.toDataURL('image/jpeg', quality);
                    
                    const a = document.createElement('a');
                    a.href = compressedData;
                    a.download = "compressed_" + file.name;
                    a.click();
                }
            }
        }
    </script>
</body>
</html>
